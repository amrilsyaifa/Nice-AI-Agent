name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write
  id-token: write

jobs:
  # ── 1. Build standalone binaries ──────────────────────────────────────────
  build:
    name: Build — ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # Apple Silicon (M-series)
            artifact: nice-macos-arm64
            exe: nice
          - os: ubuntu-latest
            artifact: nice-linux-x86_64
            exe: nice
          - os: windows-latest
            artifact: nice-windows-x86_64
            exe: nice.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install with dev extras
        run: uv sync --extra dev

      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: |
            build/
            ~/.pyinstaller
          key: pyinstaller-${{ matrix.os }}-${{ hashFiles('nice.spec', 'pyproject.toml', 'uv.lock') }}
          restore-keys: pyinstaller-${{ matrix.os }}-

      - name: Build binary (PyInstaller)
        run: uv run pyinstaller nice.spec --noconfirm

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist/release
          SRC="dist/${{ matrix.exe }}"
          # Windows produces .exe; others no extension
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "dist/${{ matrix.exe }}" "dist/release/${{ matrix.artifact }}.exe"
          else
            cp "dist/${{ matrix.exe }}" "dist/release/${{ matrix.artifact }}"
            chmod +x "dist/release/${{ matrix.artifact }}"
          fi
          ls -lh dist/release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/

  # ── 2. Create GitHub Release ───────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/release/*
            scripts/install.sh
            scripts/install.ps1

  # ── 3. Publish to PyPI ────────────────────────────────────────────────────
  pypi:
    name: PyPI publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel + sdist
        run: uv build

      - name: Publish
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
